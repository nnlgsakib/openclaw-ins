name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows-x86_64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-4-dev \
            libglib2.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Collect artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          mkdir -p release-artifacts
          echo "Collecting bundles from: $BUNDLE_DIR"
          find "$BUNDLE_DIR" -type f \( \
            -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.msi" -o -name "*.exe" \
          \) -exec cp -v {} release-artifacts/ \;
          echo "--- Collected artifacts ---"
          ls -la release-artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.label }}
          path: release-artifacts/
          if-no-files-found: warn
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          find . -maxdepth 2 -type f \( \
            -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.msi" -o -name "*.exe" \
          \) -exec cp -v {} release/ \;
          echo "--- Release files ---"
          ls -la release/

      - name: Verify artifacts exist
        run: |
          ARTIFACT_COUNT=$(find release -type f | wc -l)
          echo "Found $ARTIFACT_COUNT installer artifacts"
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "::error::No installer artifacts found!"
            exit 1
          fi

      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CONTRIBUTORS=$(git log "${PREV_TAG}..HEAD" --format='%an' | sort -u | sed 's/^/- /')
            COMMIT_COUNT=$(git rev-list --count "${PREV_TAG}..HEAD")
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CONTRIBUTORS=$(git log --format='%an' | sort -u | sed 's/^/- /')
            COMMIT_COUNT=$(git rev-list --count HEAD)
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          {
            echo "body<<EOF"
            echo "## ClawStation ${TAG}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            for f in release/*; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              case "$fname" in
                *.AppImage) echo "| Linux x86_64 (AppImage) | \`${fname}\` |" ;;
                *.deb)
                  if echo "$fname" | grep -q aarch64; then
                    echo "| Linux aarch64 (DEB) | \`${fname}\` |"
                  else
                    echo "| Linux x86_64 (DEB) | \`${fname}\` |"
                  fi
                  ;;
                *.rpm) echo "| Linux (RPM) | \`${fname}\` |" ;;
                *.msi) echo "| Windows (MSI) | \`${fname}\` |" ;;
                *.exe) echo "| Windows (EXE) | \`${fname}\` |" ;;
              esac
            done
            echo ""
            echo "### Changelog (${COMMIT_COUNT} commits)"
            echo ""
            echo "${CHANGELOG}"
            echo ""
            echo "<details>"
            echo "<summary>Contributors</summary>"
            echo ""
            echo "${CONTRIBUTORS}"
            echo ""
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>Installation Guide</summary>"
            echo ""
            echo "**Linux (AppImage):**"
            echo '```bash'
            echo "chmod +x ClawStation*.AppImage"
            echo "./ClawStation*.AppImage"
            echo '```'
            echo ""
            echo "**Linux (DEB):**"
            echo '```bash'
            echo "sudo dpkg -i ClawStation*.deb"
            echo '```'
            echo ""
            echo "**Windows:**"
            echo "Run the \`.msi\` installer or the \`.exe\` setup wizard."
            echo ""
            echo "</details>"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ClawStation ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
