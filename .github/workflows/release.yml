name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            label: linux-aarch64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows-x86_64
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            label: macos-x86_64
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            label: macos-aarch64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-4-dev \
            libglib2.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Add Windows ARM64 target
        if: matrix.rust_target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.rust_target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare release assets
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          mkdir -p release-artifacts
          echo "Looking for bundles in: $BUNDLE_DIR"
          ls -la "$BUNDLE_DIR" || true
          # Copy all installers into flat directory
          find "$BUNDLE_DIR" -type f \( \
            -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
            -o -name "*.zip" -o -name "*.sig" \
          \) -exec cp {} release-artifacts/ \;
          # Generate checksums
          cd release-artifacts
          for f in *.AppImage *.deb *.rpm *.msi *.exe *.dmg *.zip 2>/dev/null; do
            [ -f "$f" ] || continue
            if command -v sha256sum &> /dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
            echo "Checksummed: $f"
          done
          echo "--- release-artifacts contents ---"
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: release-artifacts/
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find downloaded-artifacts -type f \( \
            -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
            -o -name "*.zip" -o -name "*.sig" -o -name "*.sha256" \
          \) -exec cp {} release-files/ \;
          echo "--- Release files ---"
          ls -la release-files/

      - name: Verify artifacts exist
        run: |
          ARTIFACT_COUNT=$(find release-files -type f ! -name "*.sha256" | wc -l)
          echo "Found $ARTIFACT_COUNT installer artifacts"
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "::error::No installer artifacts found!"
            exit 1
          fi
          CHECKSUM_COUNT=$(find release-files -name "*.sha256" | wc -l)
          echo "Found $CHECKSUM_COUNT checksum files"

      - name: Create release body
        run: |
          {
            echo "## ClawStation ${{ github.ref_name }}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| File | SHA-256 |"
            echo "|------|---------|"
            for f in release-files/*.sha256; do
              [ -f "$f" ] || continue
              fname=$(basename "$f" .sha256)
              hash=$(awk '{print $1}' "$f")
              echo "| \`$fname\` | \`${hash:0:16}...\` |"
            done
            echo ""
            echo "<details><summary>Full checksums</summary>"
            echo ""
            echo '```'
            cat release-files/*.sha256 2>/dev/null || echo "No checksums"
            echo '```'
            echo ""
            echo "</details>"
          } > release-body.md
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: release-body.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          tag_name: ${{ github.ref_name }}
